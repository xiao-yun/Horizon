name: Daily Horizon Summary

on:
  schedule:
    - cron: '27 20 * * *'  # UTC 20:27 + fork 延迟 4-5h ≈ 北京时间 8:30-9:30
  workflow_dispatch:
    inputs:
      categories:
        description: 'Category filter (comma-separated, e.g. data-warehouse,ai-tools). Leave empty for all.'
        required: false
        type: string

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run Horizon
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          if [ -n "${{ inputs.categories }}" ]; then
            uv run horizon --hours 25 --categories "${{ inputs.categories }}"
          else
            uv run horizon --hours 25
          fi

      - name: Set current date
        run: echo "DATE=$(TZ='Asia/Shanghai' date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Commit and push generated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/_posts/ data/summaries/
          git diff --cached --quiet || git commit -m "📝 Daily Summary: ${{ env.DATE }}"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
          publish_branch: gh-pages
          enable_jekyll: true
